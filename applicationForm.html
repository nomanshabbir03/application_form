<!DOCTYPE html>
<html lang="en">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="applicationForm.css">
    <title>Application Form</title>
</head>
<body>
    <header>
        <h1>Application Form</h1>
    </header>
    <form>
        <ol>
            <li><h3>General Questions</h3></li>
            <div id="generalQuestions">
                <div class="row">
                    <label for="personalInformation">Personal Information:</label>
                    <input type="text" name="personalInformation" id="personalInformation">
                </div>
            <div class="row">
                <label for="dob">Date of Birth:</label>
                <input type="date" name="dateOfBirth" id="dob">
            </div>
            
            <div class="row">
                <label>Gender</label>
                <input type="radio" name="gender" id="male">
                <label for="male">Male</label>
                <input type="radio" name="gender" id="female">
                <label for="female">Female</label>
            </div>
            
            <div class="row">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email">
            </div>
            
            
            <div class="row">
                <label>Marital Status</label>
                <input type="checkbox" id="single">
                <label for="single">Single</label>
                <input type="checkbox" name="married" id="married">
                <label for="married">Married</label>
                <input type="checkbox" name="divorced" id="divorced">
                <label for="divorced">Divorced</label>
            </div>
            
            <div class="row">
            <label>Are you retire?</label>
            <input type="radio" id="yes" name="retire" >
            <label for="yes">Yes</label>
            <input type="radio" id="no" name="retire">
            <label for="no">No</label>
            </div>




            <li><h3>Type of Health Coverage</h3></li>
            <div class="row">
                <label>Employee Plan Choice</label>
                <input type="radio" id="yes" name="yes">
                <label for="yes">Yes</label>
                <input type="radio" id="no" name="no">
                <label for="no">No</label>
            </div>
            <div class="row">
                <label>Spouse Plan Choice</label>
                <input type="radio" id="yes" name="yes">
                <label for="yes">Yes</label>
                <input type="radio" id="no" name="no">
                <label for="no">No</label>
            </div>
            <div class="row">
                <label>Children Plan Choice</label>
                <input type="radio" id="yes" name="yes">
                <label for="yes">Yes</label>
                <input type="radio" id="no" name="no">
                <label for="no">No</label>
            </div>

            <h4>Complete if Spouce/Children are proposed for insurance</h4>
            <table>
                <tr>
                    <th>Name</th>
                    <th>File</th>
                    <th>Relationship to proposed</th>
                    <th>Birth Date</th>
                    <th>Age</th>
                    <th>Sex</th>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                </tr>
            </table>

            <li><h3>The Policy</h3></li>
            <div class="row">
            <label for="units">Units</label>
            <input type="text" name="units" id="units">
                </div>
                <div class="row">
            <label for="annualPremium"></label>
            <input type="text" name="annualPremiuim" id="annualPremium">
                    </div>
            <div class="row">
                <label>Payment Mode</label>
                <input type="checkbox" name="annual" id="annual">
                <label for="annual">Annual</label>
                <input type="checkbox" name="semi-annual" id="semi-annual">
                <label for="semi-annual">Semi-Annual</label>
                <input type="checkbox" name="monthly" id="monthly">
                <label for="annual">Monthly</label>
            </div>
            <div class="row">
            
            <label for="cashApplication">Cash with Application</label>
            <input type="text" name="cashApplication" id="cashApplication">
            </div>
            <div class="row">
            <label for="premiumPlan">Planned Model premium</label>
            <input type="text" name="premiuimPlan" id="premiumPlan">
                </div>
        </ol>

        <div class="submit">
        <button>Submit</button>
        </div>
    </form>
</body>
</html>
